<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ site_name }} - Admin Login</title>
    <style>
        :root {
            --primary-color: {{ primary_color }};
            --accent-color: {{ accent_color }};
            --bg-color: #0d0d0d;
            --text-color: #ffffff;
        }
        body {
            font-family: monospace, Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .login-box {
            max-width: 400px;
            width: 100%;
            border: 2px solid var(--primary-color);
            padding: 30px;
            background-color: #111111;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo {
            max-height: 50px;
            margin-bottom: 10px;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
        }
        input {
            background-color: #1a1a1a;
            color: #ffffff;
            border: 1px solid var(--primary-color);
            font-family: monospace;
            padding: 10px;
            width: 100%;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary-color);
            color: #000000;
            border: none;
            font-family: monospace;
            font-weight: bold;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover {
            opacity: 0.9;
        }
        .error {
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="header">
            <img class="logo" src="{{ site_logo }}" alt="Site Logo">
            <div class="title">{{ site_name }} Admin Portal</div>
        </div>
        
        {% if error_message %}
            <div class="error">{{ error_message }}</div>
        {% endif %}
        
        <form action="/admin/login" method="post">
            <label for="password">Enter Administrator Password:</label>
            <input type="password" id="password" name="password" required placeholder="Password">
            <button type="submit">Log In</button>
        </form>
    </div>
</body>
</html>
