version: '3.8'

services:
  openticket:
    build: .
    container_name: openticket_app
    ports:
      - "8000:8000"
    volumes:
      - openticket_data:/app/data
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: sh -c "alembic upgrade head && uvicorn src.backend.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - DATABASE_URL=sqlite:////app/data/openticket.db
      - STRIPE_API_KEY=sk_test_placeholder_key
      - STRIPE_WEBHOOK_SECRET=whsec_placeholder_secret
      - TESTING=False
    restart: unless-stopped

volumes:
  openticket_data:
