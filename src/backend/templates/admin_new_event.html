{% extends "base.html" %}
{% block content %}
<div>
    <h2>Create New Event</h2>
    <form action="/admin/events/new" method="post" id="create-event-form">
        <label for="name">Event Name:</label>
        <input type="text" id="name" name="name" required placeholder="e.g. Underground Rave">
        
        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="4" placeholder="Event description..."></textarea>
        
        <label for="date">Date & Time:</label>
        <input type="datetime-local" id="date" name="date" required>
        
        <label for="location">Location:</label>
        <input type="text" id="location" name="location" required placeholder="e.g. The Warehouse">
        
        <label for="visible_from">Visible From (Optional):</label>
        <input type="datetime-local" id="visible_from" name="visible_from">
        
        <label style="display: flex; align-items: center; gap: 10px; margin-top: 15px; margin-bottom: 20px;">
            <input type="checkbox" id="offers_physical_tickets" name="offers_physical_tickets" value="true" style="width: auto; margin: 0;">
            Offers Physical Tickets Delivery
        </label>
        
        <button type="submit">Create Event</button>
    </form>
</div>
{% endblock %}
